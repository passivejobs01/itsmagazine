<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음성 클로닝 API 테스터</title>
<style>
  :root { --accent:#4f8ef7; --bg:#0f1117; --card:#1a1d27; --text:#e2e8f0; --sub:#94a3b8; --border:#2d3348; --ok:#34d399; --err:#f87171; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); padding:18px; font-size:14px; line-height:1.6; max-width:760px; margin:0 auto; }
  h1 { font-size:1.3rem; color:var(--accent); margin-bottom:14px; }
  h2 { font-size:1rem; margin:0 0 10px; border-left:3px solid var(--accent); padding-left:9px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; }
  label { display:block; font-size:0.82rem; color:var(--sub); margin:8px 0 3px; }
  input,select,textarea { width:100%; background:#0f1320; color:var(--text); border:1px solid var(--border); border-radius:7px; padding:8px 10px; font-size:0.9rem; font-family:inherit; }
  textarea { resize:vertical; min-height:70px; }
  .row { display:flex; gap:10px; } .row > div { flex:1; }
  button { background:var(--accent); color:#fff; border:0; border-radius:7px; padding:9px 16px; font-size:0.9rem; font-weight:600; cursor:pointer; margin-top:12px; }
  button:hover { filter:brightness(1.1); } button:disabled { opacity:0.5; cursor:not-allowed; }
  button.ghost { background:transparent; border:1px solid var(--border); color:var(--sub); padding:5px 10px; font-size:0.78rem; margin:0; }
  button.del { background:transparent; border:1px solid var(--err); color:var(--err); padding:4px 9px; font-size:0.75rem; margin:0; }
  .msg { margin-top:10px; padding:9px 12px; border-radius:7px; font-size:0.85rem; display:none; white-space:pre-wrap; }
  .msg.ok { background:#0e2a20; color:var(--ok); display:block; } .msg.err { background:#2a1414; color:var(--err); display:block; }
  .voice { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border:1px solid var(--border); border-radius:7px; margin-bottom:6px; }
  .voice small { color:var(--sub); }
  .hint { font-size:0.76rem; color:var(--sub); margin-top:4px; }
  audio { width:100%; margin-top:12px; }
  a { color:var(--accent); }
  .inline { display:flex; gap:8px; align-items:center; }
  .inline input[type=checkbox] { width:auto; }
</style>
</head>
<body>
  <h1>🎙️ 음성 클로닝 API 테스터</h1>

  <div class="card">
    <label>API 서버 주소</label>
    <input id="base" value="http://localhost:8003">
    <div class="hint">공개 도메인이 있으면 그 주소로 바꾸세요 (예: <code>https://your-server.example.com</code>).</div>
  </div>

  <!-- 등록 음성 목록 -->
  <div class="card">
    <h2>등록된 음성 <button class="ghost" onclick="loadVoices()">새로고침</button></h2>
    <div id="voices"><span class="hint">불러오는 중…</span></div>
  </div>

  <!-- 음성 등록 -->
  <div class="card">
    <h2>① 음성 등록</h2>
    <label>이름 *</label>
    <input id="reg_name" placeholder="예: 내목소리">
    <label>참조 음성 파일 * (3~15초 권장)</label>
    <input id="reg_file" type="file" accept="audio/*">
    <div class="row">
      <div>
        <label>언어</label>
        <select id="reg_lang"></select>
      </div>
      <div>
        <label>&nbsp;</label>
        <div class="inline"><input type="checkbox" id="reg_auto"><label style="margin:0">참조 텍스트 자동 추출(STT)</label></div>
      </div>
    </div>
    <label>참조 텍스트 (자동 추출 체크 시 비워두세요)</label>
    <textarea id="reg_text" placeholder="참조 음성에서 말한 정확한 문장"></textarea>
    <button id="reg_btn" onclick="register()">등록</button>
    <div id="reg_msg" class="msg"></div>
  </div>

  <!-- 합성 -->
  <div class="card">
    <h2>② 텍스트 → 음성 합성</h2>
    <label>음성 선택 *</label>
    <select id="gen_voice"></select>
    <label>합성할 텍스트 *</label>
    <textarea id="gen_text" placeholder="여기에 읽어줄 내용을 입력하세요."></textarea>
    <div class="row">
      <div><label>언어</label><select id="gen_lang"></select></div>
      <div><label>포맷</label><select id="gen_fmt"><option value="wav">wav</option><option value="mp3">mp3</option></select></div>
    </div>
    <div class="row">
      <div><label>청크당 최대 글자수</label><input id="gen_maxchars" type="number" value="200"></div>
      <div><label>청크 간 무음(초)</label><input id="gen_gap" type="number" step="0.1" value="0.3"></div>
    </div>
    <button id="gen_btn" onclick="generate()">합성하기</button>
    <div id="gen_msg" class="msg"></div>
    <div id="gen_result"></div>
  </div>

<script>
const LANGS = ["Korean","English","Japanese","Chinese","German","French","Spanish","Italian","Portuguese","Russian"];
const $ = id => document.getElementById(id);
const base = () => $("base").value.replace(/\/+$/,"");

function fillLangs() {
  for (const sel of [$("reg_lang"), $("gen_lang")]) {
    sel.innerHTML = LANGS.map(l => `<option>${l}</option>`).join("");
  }
}
function show(el, ok, text) { el.className = "msg " + (ok ? "ok" : "err"); el.textContent = text; }

async function loadVoices() {
  const box = $("voices"), sel = $("gen_voice");
  box.innerHTML = `<span class="hint">불러오는 중…</span>`;
  try {
    const r = await fetch(base() + "/tts/voices");
    const d = await r.json();
    if (!d.voices || d.voices.length === 0) {
      box.innerHTML = `<span class="hint">등록된 음성이 없습니다. 아래에서 먼저 등록하세요.</span>`;
      sel.innerHTML = `<option value="">(등록된 음성 없음)</option>`;
      return;
    }
    box.innerHTML = d.voices.map(v => `
      <div class="voice">
        <div><b>${v.name}</b><br><small>${v.created} · "${(v.ref_text||"").slice(0,40)}…"</small></div>
        <button class="del" onclick="removeVoice('${encodeURIComponent(v.name)}')">삭제</button>
      </div>`).join("");
    sel.innerHTML = d.voices.map(v => `<option>${v.name}</option>`).join("");
  } catch (e) {
    box.innerHTML = `<span class="hint" style="color:var(--err)">불러오기 실패: ${e}. 서버 주소/CORS 확인.</span>`;
  }
}

async function removeVoice(encName) {
  if (!confirm("삭제할까요?")) return;
  try {
    const r = await fetch(base() + "/tts/voices/" + encName, { method: "DELETE" });
    if (!r.ok) throw new Error((await r.json()).detail || r.status);
    loadVoices();
  } catch (e) { alert("삭제 실패: " + e); }
}

async function register() {
  const btn = $("reg_btn"), msg = $("reg_msg");
  const name = $("reg_name").value.trim();
  const file = $("reg_file").files[0];
  if (!name || !file) { show(msg, false, "이름과 참조 음성 파일은 필수입니다."); return; }
  const fd = new FormData();
  fd.append("name", name);
  fd.append("language", $("reg_lang").value);
  fd.append("ref_text", $("reg_text").value);
  fd.append("auto_ref_text", $("reg_auto").checked ? "true" : "false");
  fd.append("file", file);
  btn.disabled = true; show(msg, true, "등록 중… (자동 추출 시 STT로 수십 초 걸릴 수 있어요)");
  try {
    const r = await fetch(base() + "/tts/voices/register", { method: "POST", body: fd });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.status);
    show(msg, true, `등록 완료: ${d.name}\n참조 텍스트: ${d.ref_text}`);
    loadVoices();
  } catch (e) { show(msg, false, "등록 실패: " + e); }
  finally { btn.disabled = false; }
}

async function generate() {
  const btn = $("gen_btn"), msg = $("gen_msg"), res = $("gen_result");
  const voice = $("gen_voice").value, text = $("gen_text").value.trim();
  if (!voice) { show(msg, false, "음성을 먼저 등록/선택하세요."); return; }
  if (!text) { show(msg, false, "텍스트를 입력하세요."); return; }
  res.innerHTML = "";
  btn.disabled = true;
  show(msg, true, "합성 중… (첫 호출은 모델 로딩으로 수십 초 걸릴 수 있어요)");
  const t0 = Date.now();
  try {
    const r = await fetch(base() + "/tts/generate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        voice, text, language: $("gen_lang").value, fmt: $("gen_fmt").value,
        max_chars: parseInt($("gen_maxchars").value) || 200,
        chunk_gap: parseFloat($("gen_gap").value) || 0,
      }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.status);
    show(msg, true, `완료 · 서버 ${d.elapsed_sec}s · ${d.chars}자 · ${d.sample_rate}Hz (왕복 ${((Date.now()-t0)/1000).toFixed(1)}s)`);
    res.innerHTML = `<audio controls autoplay src="${d.url}"></audio>
      <div class="hint">⬇ <a href="${d.url}" download>${d.filename} 다운로드</a></div>`;
  } catch (e) { show(msg, false, "합성 실패: " + e); }
  finally { btn.disabled = false; }
}

fillLangs();
loadVoices();
</script>
</body>
</html>
